services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: datapalestine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: datapalestine
      POSTGRES_USER: datapalestine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ../packages/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapalestine -d datapalestine"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=4MB
      -c effective_cache_size=512MB
      -c max_connections=20
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c random_page_cost=1.1

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: datapalestine-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://datapalestine:${POSTGRES_PASSWORD}@db:5432/datapalestine
      DATABASE_URL_SYNC: postgresql://datapalestine:${POSTGRES_PASSWORD}@db:5432/datapalestine
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://datapalestine.org}
      LOG_LEVEL: INFO
    volumes:
      - /root/data:/data:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://datapalestine.org}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://datapalestine.org}
    container_name: datapalestine-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://datapalestine.org}
      API_INTERNAL_URL: http://api:8000
    networks:
      - internal
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    container_name: datapalestine-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  caddy_data:
  caddy_config:
